<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineCritic</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="nav-root"></div>

  <main class="page">
    <div class="controls" role="region" aria-label="Browse movies">
      <input
        id="search-input"
        type="search"
        class="controls__search"
        placeholder="Search movies by title..."
        aria-label="Search movies"
      />
      <select id="genre-filter" class="controls__select" aria-label="Filter by genre">
        <option value="">All genres</option>
        <option value="Drama">Drama</option>
        <option value="Sci-Fi">Sci-Fi</option>
        <option value="Thriller">Thriller</option>
        <option value="Comedy">Comedy</option>
        <option value="Romance">Romance</option>
        <option value="Action">Action</option>
        <option value="Horror">Horror</option>
        <option value="Animation">Animation</option>
      </select>
      <div class="pill-group" role="group" aria-label="Sort order">
        <button type="button" class="pill pill--active" data-sort="title" data-order="asc">A–Z</button>
        <button type="button" class="pill" data-sort="rating" data-order="desc">Top rated</button>
        <button type="button" class="pill" data-sort="year" data-order="desc">Newest</button>
      </div>
    </div>

    <section id="movie-grid" class="movie-grid" aria-live="polite" aria-busy="true"></section>
  </main>

  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script src="js/api.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/movie-detail.js"></script>
  <script src="js/movies.js"></script>
</body>
</html>
