<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in · CineCritic</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="nav-root"></div>

  <main class="auth-wrap">
    <section class="auth-card" aria-labelledby="auth-heading">
      <h1 id="auth-heading" class="sr-only" style="position:absolute; left:-9999px;">Log in or sign up</h1>

      <div class="auth-tabs" role="tablist" aria-label="Authentication mode">
        <button type="button" class="auth-tab auth-tab--active" role="tab" data-tab="login" aria-selected="true">Log in</button>
        <button type="button" class="auth-tab" role="tab" data-tab="signup" aria-selected="false">Sign up</button>
      </div>

      <form id="login-form" class="auth-form" novalidate>
        <label for="login-email">Email</label>
        <input type="email" id="login-email" name="email" autocomplete="email" required />

        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" autocomplete="current-password" required />

        <div class="auth-form__error" id="login-error" role="alert"></div>

        <button type="submit" class="btn btn--primary btn--full">Log in</button>
      </form>

      <form id="signup-form" class="auth-form" novalidate hidden>
        <label for="signup-username">Username</label>
        <input type="text" id="signup-username" name="username" autocomplete="username" required />

        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" name="email" autocomplete="email" required />

        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" name="password" autocomplete="new-password" required minlength="6" />

        <label for="signup-confirm">Confirm password</label>
        <input type="password" id="signup-confirm" name="confirm" autocomplete="new-password" required />

        <div class="auth-form__error" id="signup-error" role="alert"></div>

        <button type="submit" class="btn btn--primary btn--full">Create account</button>
      </form>
    </section>
  </main>

  <div id="toast-root"></div>

  <script src="js/api.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
